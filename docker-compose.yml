services:
  greenmail:
    image: greenmail/standalone:2.1.2
    ports:
      - "3025:3025"   # SMTP
      - "3110:3110"   # POP3
      - "3143:3143"   # IMAP
      - "3465:3465"   # SMTPS
      - "3993:3993"   # IMAPS
      - "9080:8080"   # Greenmail API
    environment:
      - GREENMAIL_OPTS=-Dgreenmail.setup.test.all -Dgreenmail.users=testuser:testpass@localhost -Dgreenmail.verbose -Dgreenmail.hostname=0.0.0.0
